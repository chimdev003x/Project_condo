name = "condo-finder-api"
main = "worker/index.ts"
compatibility_date = "2026-06-14"
workers_dev = false

[[routes]]
pattern = "condofinder.com/*"
zone_id = "bf82b46d3937d52066c9fd58ee8bd421"

[[routes]]
pattern = "www.condofinder.com/*"
zone_id = "bf82b46d3937d52066c9fd58ee8bd421"

[assets]
directory = "./dist/condo-finder/browser"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "condo-finder-db"
database_id = "d228e929-dc38-4fc3-8b45-21cff34a4688"
migrations_dir = "migrations"
